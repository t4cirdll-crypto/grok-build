name: Build GrokSuper

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: ""
            binary: xai-grok-pager
            protoc: protobuf-compiler
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: ".exe"
            binary: xai-grok-pager.exe
            protoc: protoc

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install protoc + NASM (Ubuntu)
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.protoc }} nasm
        if: matrix.os == 'ubuntu-latest'

      - name: Install protoc + NASM (Windows)
        run: |
          choco install protoc nasm -y
          echo "PROTOC=C:\ProgramData\chocolatey\lib\protoc\tools\bin\protoc.exe" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "C:\ProgramData\chocolatey\lib\protoc\tools\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
        if: matrix.os == 'windows-latest'
        shell: pwsh

      - name: Build release
        if: matrix.os != 'windows-latest'
        run: cargo build --release -p xai-grok-pager-bin --target ${{ matrix.target }}
        env:
          PROTOC: ${{ env.PROTOC || 'protoc' }}

      - name: Build release (Windows)
        if: matrix.os == 'windows-latest'
        run: cargo build --release -p xai-grok-pager-bin --target ${{ matrix.target }}
        env:
          PROTOC: ${{ env.PROTOC || 'protoc' }}
          RUSTFLAGS: -C link-args=/DEBUG:LongSymbolTruncate

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: groksuper-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}
          retention-days: 7
